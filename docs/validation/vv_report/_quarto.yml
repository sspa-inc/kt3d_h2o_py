project:
  type: default
  output-dir: _output

format:
  pdf:
    documentclass: scrreprt
    classoption:
      - headings=normal
    toc: true
    toc-depth: 2
    number-sections: true
    colorlinks: true
    linkcolor: "NavyBlue"
    urlcolor: "NavyBlue"
    citecolor: "NavyBlue"
    geometry:
      - top=0.9in
      - bottom=0.9in
      - left=0.75in
      - right=0.75in
    mainfont: "Latin Modern Roman"
    sansfont: "Latin Modern Sans"
    monofont: "Latin Modern Mono"
    fontsize: 11pt
    linestretch: 1.15
    include-in-header:
      text: |
        \usepackage{booktabs}
        \usepackage{longtable}
        \usepackage{array}
        \usepackage{tabularx}
        \usepackage{makecell}
        \usepackage{xcolor}
        \usepackage{colortbl}
        \usepackage{float}
        \usepackage{caption}
        \usepackage{microtype}
        \usepackage{etoolbox}

        % Modern color palette
        \definecolor{sectionblue}{HTML}{1B4F72}
        \definecolor{accentblue}{HTML}{2980B9}
        \definecolor{lightgray}{HTML}{F2F3F4}
        \definecolor{passgreen}{HTML}{27AE60}
        \definecolor{failred}{HTML}{E74C3C}
        \definecolor{rulecolor}{HTML}{BDC3C7}

        % Modern section headings via KOMA-Script
        \addtokomafont{chapter}{\color{sectionblue}\sffamily}
        \addtokomafont{section}{\color{sectionblue}\sffamily}
        \addtokomafont{subsection}{\color{sectionblue}\sffamily}

        % Tighter caption styling
        \captionsetup{font=small, labelfont=bf, labelsep=period, skip=8pt}

        % Shrink Quarto code-output blocks (Shaded environment) to fit page
        \AtBeginEnvironment{Shaded}{\tiny}
        \AtBeginEnvironment{verbatim}{\tiny}

        % Table styling defaults
        \renewcommand{\arraystretch}{1.3}

        % Title page styling
        \makeatletter
        \renewcommand*{\maketitle}{%
          \begin{titlepage}
            \centering
            \vspace*{2cm}
            {\color{sectionblue}\rule{\textwidth}{2pt}}\\[1.5cm]
            {\Huge\sffamily\bfseries\color{sectionblue} \@title \\[0.5cm]}
            {\Large\sffamily\color{accentblue} \@subtitle \\[2cm]}
            {\large\sffamily \@author \\[0.5cm]}
            {\large\sffamily \@date \\[2cm]}
            {\color{sectionblue}\rule{\textwidth}{2pt}}\\[1cm]
            \vfill
            {\small\sffamily Document Status: Automated V\&V Report — Generated by Quarto}
          \end{titlepage}
        }
        \makeatother
    fig-pos: "H"
    keep-tex: false
    default-image-extension: png

execute:
  echo: false
  warning: false
  error: true
